name: Update Smart README

on:
  schedule:
    # Runs every day at 06:00 UTC. Adjust the cron if you want it more/less often.
    - cron: "0 6 * * *"
  workflow_dispatch: # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main
    paths:
      - ".github/scripts/update-readme.js"
      - ".github/workflows/update-readme.yml"

# Allow the workflow to push the regenerated README back to the repo.
permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate README sections
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: node .github/scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- README.md; then
            echo "No README changes to commit."
          else
            git add README.md
            git commit -m "chore: refresh README with live GitHub data [skip ci]"
            git push
          fi
